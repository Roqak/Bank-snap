name: banksnap
description: AI-Powered Account Number Capture & Bank App Automation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  
  # OCR
  google_mlkit_text_recognition: ^0.11.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Device Info
  # device_apps: ^2.2.0  # Discontinued - using native implementation instead
  permission_handler: ^11.1.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Utils
  intl: ^0.18.1
  equatable: ^2.0.5
  path_provider: ^2.1.1
  path: ^1.8.3
  image: ^4.1.3
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/